server {
    listen 80;

    # 1. Wenn die URL /invoices/... enthält -> Lade die PDF aus dem Ordner
    location /invoices/ {
        root /usr/share/nginx/html;
        # Wichtig: CORS-Header erlauben, damit Camunda Cloud die PDF im iFrame laden darf
        add_header Access-Control-Allow-Origin *; 
    }

    # 2. Bei allen anderen URLs -> Leite die Anfrage nahtlos an n8n weiter
    location / {
        proxy_pass http://n8n:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}