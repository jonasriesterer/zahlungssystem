services:
  # ==========================================
  # DATABASES & INFRASTRUCTURE
  # ==========================================
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: invoice_user
      POSTGRES_PASSWORD: invoice_password
      POSTGRES_DB: invoice_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - invoice_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice_user -d invoice_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"      # AMQP protocol
      - "15672:15672"    # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - invoice_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "True"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - invoice_network

  # ==========================================
  # CORE BACKEND SERVICES
  # ==========================================
  grpc-server:
    build:
      context: .
      dockerfile: Dockerfile.grpc_server
    environment:
      DATABASE_URL: postgresql://invoice_user:invoice_password@postgres:5432/invoice_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F?heartbeat=300&blocked_connection_timeout=300
      PYTHONPATH: /app
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - invoice_network

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile.payment_service
    environment:
      DATABASE_URL: postgresql://invoice_user:invoice_password@postgres:5432/invoice_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F?heartbeat=300&blocked_connection_timeout=300
      GRPC_SERVER_TARGET: grpc-server:50051
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      grpc-server:
        condition: service_started
    networks:
      - invoice_network

  # ==========================================
  # TOOLS (MAILPIT, N8N, NGROK)
  # ==========================================
  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - invoice_network

  n8n:
    image: docker.n8n.io/n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - invoice_network
    dns:              
      - 8.8.8.8        
      - 1.1.1.1

  ngrok:
    image: ngrok/ngrok:latest
    command: http n8n:5678
    env_file:
      - .env
    networks:
      - invoice_network
    depends_on:
      - n8n

  # ==========================================
  # CAMUNDA WORKERS
  # ==========================================
  register-invoice-worker:
    build:
      context: .
      dockerfile: Dockerfile.workers
    command: [".venv/bin/python", "-m", "workers.register_invoice_worker"]
    environment:
      CAMUNDA_WORKER_NAME: register-invoice-worker
      DATABASE_URL: postgresql://invoice_user:invoice_password@postgres:5432/invoice_db
      PYTHONPATH: /app
    env_file:
      - .env
    networks:
      - invoice_network

  request-info-worker:
    build:
      context: .
      dockerfile: Dockerfile.workers
    command: [".venv/bin/python", "-m", "workers.request_info_worker"]
    environment:
      CAMUNDA_WORKER_NAME: request-info-worker
      DATABASE_URL: postgresql://invoice_user:invoice_password@postgres:5432/invoice_db
      PYTHONPATH: /app
    env_file:
      - .env
    networks:
      - invoice_network

  inform-supplier-rejection-worker:
    build:
      context: .
      dockerfile: Dockerfile.workers
    command: [".venv/bin/python", "-m", "workers.inform_supplier_rejection_worker"]
    environment:
      CAMUNDA_WORKER_NAME: inform-supplier-rejection-worker
      DATABASE_URL: postgresql://invoice_user:invoice_password@postgres:5432/invoice_db
      PYTHONPATH: /app
    env_file:
      - .env
    networks:
      - invoice_network

  execute-payment-worker:
    build:
      context: .
      dockerfile: Dockerfile.workers
    command: [".venv/bin/python", "-m", "workers.execute_payment_worker"]
    environment:
      CAMUNDA_WORKER_NAME: execute-payment-worker
      DATABASE_URL: postgresql://invoice_user:invoice_password@postgres:5432/invoice_db
      PYTHONPATH: /app
    env_file:
      - .env
    networks:
      - invoice_network

  mail-listener-worker:
    build:
      context: .
      dockerfile: Dockerfile.workers
    command: [".venv/bin/python", "-m", "workers.mail_listener"]
    environment:
      CAMUNDA_WORKER_NAME: mail-listener-worker
      MAILPIT_API_URL: http://mailpit:8025/api/v1
      PYTHONPATH: /app
    env_file:
      - .env
    networks:
      - invoice_network
    depends_on:
      - mailpit

# ==========================================
# VOLUMES & NETWORKS
# ==========================================
volumes:
  postgres_data:
  rabbitmq_data:
  pgadmin_data:
  n8n_data:
    external: true # Behält deine bestehenden n8n-Workflows!

networks:
  invoice_network:
    name: invoice_network